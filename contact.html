<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Baloo+Thambi+2:wght@400..800&family=Diplomata&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Itim&family=Kablammo&family=Michroma&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&family=Outfit:wght@100..900&family=WindSong:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="asset/css/contact.css">
    <title>Login</title>
</head>
<body>
    <div class="form-box">
        <div class="title">Giải đáp thắc mắc</div>
        <form id="myForm">
            <div class="row">
                <div class="group">
                    <label>Họ và tên</label>
                    <input type="text" id="name" placeholder="Nguyễn Văn A" >
                    <small class="error" id="name-error"></small>
                </div>
                <div class="group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="email@example.com" >
                    <small class="error" id="email-error"></small>
                </div>
            </div>
            <div class="row">
                <div class="group">
                    <label>Số điện thoại</label>
                    <input type="text" id="phone" placeholder="0901234567" >
                    <small class="error" id="phone-error"></small>
                </div>
                <div class="group">
                    <label>Chủ đề</label>
                    <select id="topic">
                        <option>Góp ý</option>
                        <option>Hợp tác</option>
                    </select>
                </div>
            </div>
            <div class="group">
                <label>Nội dung tin nhắn</label>
                <textarea id="message" placeholder="Vui lòng mô tả chi tiết yêu cầu của bạn..."></textarea>
                <small class="error" id="message-error"></small>
            </div>
            <button type="submit">Gửi yêu cầu</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="asset/js/contact.js"></script>
</body>
</html>
